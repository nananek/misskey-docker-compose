name: Build misskey image

on:
  push:
    branches: [master]
    paths:
      - 'misskey/Dockerfile'
      - '.github/workflows/build-misskey.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey
          tags: |
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,prefix=sha-

      - name: Build and push (SHA tag)
        uses: docker/build-push-action@v6
        with:
          context: misskey
          file: misskey/Dockerfile
          pull: true
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey:${{ github.sha }}
        run: |
          set -euo pipefail

          echo "==> CMD contents"
          CMD=$(docker inspect --format='{{json .Config.Cmd}}' $IMAGE)
          echo "$CMD"

          echo "==> CMD must not reference pnpm"
          if echo "$CMD" | grep -q '"pnpm"'; then
            echo "ERROR: CMD references pnpm which is not available in the image"
            exit 1
          fi

          echo "==> Container startup (exit 127 = binary not found)"
          timeout 10 docker run --rm $IMAGE || EXIT=$?
          if [ "${EXIT:-0}" = "127" ]; then
            echo "ERROR: CMD binary not found (exit 127)"
            exit 1
          fi
          echo "OK: exit ${EXIT:-0} (expected: DB/config not available)"

      - name: Push final tags
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey:latest \
            ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey:${{ github.sha }}
          for TAG in ${{ steps.meta.outputs.tags }}; do
            docker buildx imagetools create \
              --tag "$TAG" \
              ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey:${{ github.sha }}
          done
