name: Build misskey image

on:
  push:
    branches: [master]
    paths:
      - 'misskey/Dockerfile'
      - '.github/workflows/build-misskey.yml'
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mk-nekonomisskey
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYY-MM-DD'}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: misskey
          file: misskey/Dockerfile
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
